  <title>SVT Official FantaSanremo — Glitter Pop</title>
  <meta name="theme-color" content="#120026" />
  <style>
    :root{
      --bgA:#0b0016; --bgB:#13002a; --line: rgba(255,255,255,.16);
      --ink: rgba(255,255,255,.93); --muted: rgba(255,255,255,.65);
      --shadow: 0 18px 60px rgba(0,0,0,.35); --r: 26px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(255,79,216,.25), transparent 60%),
        radial-gradient(1000px 600px at 80% 20%, rgba(34,211,238,.18), transparent 60%),

        linear-gradient(180deg, var(--bgA), var(--bgB));
      overflow-x:hidden;
    }
    .sparkle{position:fixed; inset:0; pointer-events:none; opacity:.35;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.9) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 70% 18%, rgba(255,255,255,.8) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 35% 75%, rgba(255,255,255,.7) 40%, transparent 45%),
        radial-gradient(2px 2px at 85% 65%, rgba(255,255,255,.75) 40%, transparent 45%),
        radial-gradient(1.2px 1.2px at 55% 45%, rgba(255,255,255,.6) 40%, transparent 45%);
      filter: blur(.2px); animation: tw 6s ease-in-out infinite alternate;
    }
    @keyframes tw{ from{opacity:.25} to{opacity:.45} }
    .wrap{max-width:1150px; margin:0 auto; padding:26px 16px 70px;}
    .top{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; justify-content:space-between; margin-bottom:16px;}
    .brand{display:flex; flex-direction:column; gap:10px;}
    .badge{
      display:inline-flex; align-items:center; gap:10px; padding:8px 12px; border-radius:999px;
      border:1px solid var(--line);
      background: linear-gradient(135deg, rgba(255,79,216,.18), rgba(34,211,238,.12));
      box-shadow: 0 10px 30px rgba(255,79,216,.08);
      font-size:12px; font-weight:900; letter-spacing:.03em;
    }
    .h1{
      font-size:34px; font-weight:950; letter-spacing:-.03em; margin:0;
      background: linear-gradient(90deg, #fff, rgba(255,79,216,.95), rgba(34,211,238,.95), #fff);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      text-shadow: 0 0 30px rgba(255,79,216,.08);
    }
    .sub{color: var(--muted); font-size:13px; margin-top:4px; max-width: 85ch;}
    .kpi{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
    .pill{
      display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px;
      border:1px solid var(--line); background: rgba(255,255,255,.06);
      font-size:12px; font-weight:850; color: rgba(255,255,255,.82);
    }

    .tabs{display:flex; gap:10px; flex-wrap:wrap; margin: 16px 0}
    .tab{
      padding:10px 14px; border-radius:18px; border:1px solid var(--line);
      background: rgba(255,255,255,.06); font-weight:950; cursor:pointer;
    }
    .tab.active{
      background: linear-gradient(135deg, rgba(34,211,238,.22), rgba(255,79,216,.22));
      border-color: rgba(255,255,255,.25);
    }

    .grid{display:grid; gap:16px}
    @media(min-width:980px){ .cols2{grid-template-columns: 1.15fr .85fr} }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border:1px solid var(--line); border-radius: var(--r); padding:18px;
      box-shadow: var(--shadow); backdrop-filter: blur(10px);

    .title{display:flex; align-items:center; gap:10px; margin-bottom:12px}
    .ibox{

    .rankRow:hover{ transform: translateY(-1px); }
    .teamLeft{display:flex; align-items:center; gap:10px}
    .teamIcon{

    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace}

    .podium-1,.podium-2,.podium-3{position:relative}
    .podium-1::before,.podium-2::before,.podium-3::before{
      content:""; position:absolute; inset:-2px; border-radius: 20px; opacity:.45; pointer-events:none;
    }
    .podium-1{
      border-color: rgba(255, 211, 110, .35);

    }

    .podium-2{

      animation: glow2 2.2s ease-in-out infinite alternate;
    }
    .podium-2::before{

    }
    .podium-3{
      border-color: rgba(255, 167, 120, .25);
      background: linear-gradient(180deg, rgba(255,167,120,.14), rgba(0,0,0,.12));
      animation: glow3 2.6s ease-in-out infinite alternate;
    }
    .podium-3::before{
      background: radial-gradient(600px 200px at 30% 20%, rgba(255,167,120,.22), transparent 60%),

    .nightBtn{

      background: rgba(0,0,0,.25); backdrop-filter: blur(10px); gap:10px;

    .gameTitle{font-weight:950; letter-spacing:.02em;}
    .gameBtns{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .gameBtn{
      padding:10px 12px; border-radius:16px; border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06); color: rgba(255,255,255,.92);
      font-weight:950; user-select:none; cursor:pointer;
    }
    .gameHud{font-weight:950; color: rgba(255,255,255,.90);}
    .gameCanvas{width:100%; height:100%; display:block;}
    .touchPad{position:fixed; left:0; right:0; bottom:0; display:flex; justify-content:space-between; padding:12px; gap:12px;}
    .touchPad .gameBtn{flex:1; text-align:center; font-size:18px; padding:14px 12px; background: rgba(255,255,255,.08);}

</head>

    function getPoints(pointsMap, artist){
      if(pointsMap[artist] != null) return clamp(pointsMap[artist]);
      const key = norm(artist);
      if(!key) return 0;
      for(const [k,v] of Object.entries(pointsMap)){
        if(norm(k)===key) return clamp(v);
      }
      return 0;

      const ptsMap = ADMIN_POINTS[nightId] || {};

for (const a of (team.roster || [])) sum += getPoints(extraByArtist, a);

      sum += top5Info.members.length * TOP5_BONUS;
      if(top5Info.hasCaptain) sum += TOP5_BONUS; // bonus top 5 del capitano raddoppiato

        sum += getFinalRankingBonus(team.captain); // capitano raddoppia bonus/malus classifica finale
      }
      
      sum += clamp(extraByTeam[team.name] ?? 0);
      return Math.round(sum*10)/10;

      return list.some(name => norm(name) === key);
    }

    function getTeamTop5Info(team, nightId){
      const members = (team.roster || []).filter(artist => isInOfficialTop5(artist, nightId));
      const hasCaptain = members.some(artist => norm(artist) === norm(team.captain));
      return { members, hasCaptain };
    }

    function getFinalRankingPosition(artist){
      const key = norm(artist);
      if(!key) return null;
      for(const [name, pos] of Object.entries(ADMIN_FINAL_RANKING)){
        if(norm(name) === key) return clamp(pos);
      }
      return null;
    }

    function getFinalRankingBonus(artist){
      const pos = getFinalRankingPosition(artist);
      if(pos == null) return 0;
      return clamp(FINAL_RANKING_BONUS[pos] ?? 0);
    }

    
    function renderTop5Badges(team, nightId){
      const { members, hasCaptain } = getTeamTop5Info(team, nightId);
      if(!members.length) return "";

      let badges = "";
      if(hasCaptain) badges += `<span class="top5Badge gold">TOP 5</span>`;
      const silverCount = members.length - (hasCaptain ? 1 : 0);
      for(let i=0; i<silverCount; i++) badges += `<span class="top5Badge silver">TOP 5</span>`;
      return badges;
    }

    function computeNightStandings(nightId){
      const rows = TEAMS.map(team=>{
        const total = computeTeamNight(team, nightId);
        return { team, total, hot: total >= HOT_THRESHOLD }; // ✅ HOT a 150
      });
      rows.sort((a,b)=>b.total-a.total);
      return rows;
    }

    function computeStandings(){
      const rows = TEAMS.map(team=>{
        let total=0;
        for(const n of NIGHTS) total += computeTeamNight(team, n.id);
        return { team, total: Math.round(total*10)/10 };
      });
      rows.sort((a,b)=>b.total-a.total);
      return rows;
    }

    // UI state
    let tab = "classifica";
    let nightId = "n1";
    let lastTopKey = "";

    function podiumClass(idx){
      if(idx===0) return "podium-1";
      if(idx===1) return "podium-2";
      if(idx===2) return "podium-3";
      return "";
    }
    function medalBadge(idx){
      if(idx===0) return `<span class="medal">🥇 1°</span>`;
      if(idx===1) return `<span class="medal">🥈 2°</span>`;
      if(idx===2) return `<span class="medal">🥉 3°</span>`;
      return "";
    }

    function renderApp(){
      const root = document.getElementById("app");

      const standings = computeStandings();
      const nightStandings = computeNightStandings(nightId);

      const newTopKey = standings.slice(0,3).map(r=>r.team.name).join("|");
      const podiumChanged = (newTopKey && newTopKey !== lastTopKey);
      lastTopKey = newTopKey;

      root.innerHTML = `
        <div class="wrap">
          <div class="top">
            <div class="brand">
              <div class="badge">✨ SVT League App • ADMIN CENTRALE (GitHub) • PODIO + HOT + Easter egg</div>
              <h1 class="h1">${escapeHtml(LEAGUE_NAME)}</h1>
              <div class="kpi">
                <div class="pill">👥 ${TEAMS.length} squadre</div>
                <div class="pill">📅 ${NIGHTS.length} serate</div>
                <div class="pill">👑 Cap: raddoppia solo bonus TOP 5</div>
                <div class="pill">🔥 HOT: ≥ ${HOT_THRESHOLD}/serata</div>
                <div class="pill">✅ Regola TOP 5 ufficiale attiva</div>
              </div>
            </div>
          </div>

          <div class="tabs">
            <button class="tab ${tab==="classifica"?"active":""}" data-tab="classifica">🏆 Classifica</button>
            <button class="tab ${tab==="serata"?"active":""}" data-tab="serata">📅 Serata</button>
            <button class="tab ${tab==="admin"?"active":""}" data-tab="admin">🛠️ Admin</button>
          </div>

          ${tab==="classifica" ? renderClassifica(standings, nightStandings, podiumChanged) : ""}
          ${tab==="serata" ? renderSerata(nightStandings) : ""}
          ${tab==="admin" ? renderAdminHelp() : ""}

          <div class="footer">SVT Official FantaSanremo — admin centrale su GitHub • tip: se cache usa Ctrl/Cmd+Shift+R o aggiungi <span class="mono">?v=${Date.now()}</span> • versione <span class="mono">${APP_VERSION}</span></div>
        </div>
      `;

      document.querySelectorAll(".tab").forEach(b=>{
        b.addEventListener("click", ()=>{ tab = b.dataset.tab; renderApp(); });
      });
      document.querySelectorAll("[data-night]").forEach(b=>{
        b.addEventListener("click", ()=>{ nightId = b.dataset.night; renderApp(); });
      });
    }

    function renderClassifica(standings, nightStandings, podiumChanged){
      return `
        <div class="grid cols2">
          <div class="card">
            <div class="title">
              <div class="ibox">🏆</div>
              <div>
                <div class="t1">Classifica generale</div>
                <div class="t2">Somma delle serate — podio animato ✨</div>
              </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:10px">
              ${standings.map((r,idx)=>{
                const bump = podiumChanged && idx<3 ? "bump" : "";
                return `
                  <div class="rankRow ${podiumClass(idx)} ${bump}" data-teamrow="1" data-teamname="${escapeAttr(r.team.name)}">
                    <div class="teamLeft">
                      <div class="teamIcon">${escapeHtml(r.team.icon)}</div>
                      <div>
                        <div style="font-weight:950">
                          #${idx+1} — ${escapeHtml(r.team.name)}
                          ${medalBadge(idx)}
                          ${renderTop5Badges(r.team, nightId)}
                        </div>
                        <div class="small">Cap: <span class="mono" style="font-weight:900">${escapeHtml(r.team.captain||"—")}</span></div>
                      </div>
                    </div>
                    <div class="big">${r.total}</div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>

          <div class="card">
            <div class="title">
              <div class="ibox">📅</div>
              <div>
                <div class="t1">Focus serata</div>
                <div class="t2">HOT se ≥ ${HOT_THRESHOLD} punti in questa serata.</div>
              </div>
            </div>

            <div class="nightBtns">
              ${NIGHTS.map(n=>`
                <button class="nightBtn ${nightId===n.id?"active":""}" data-night="${n.id}">${escapeHtml(n.label)}</button>
              `).join("")}
            </div>

            <div style="margin-top:12px; display:flex; flex-direction:column; gap:8px">
              ${nightStandings.slice(0,6).map((r,idx)=>`
                <div class="rankRow ${podiumClass(idx)}" style="padding:10px 12px" data-teamrow="1" data-teamname="${escapeAttr(r.team.name)}">
                  <div class="teamLeft" style="gap:8px">
                    <div style="width:26px; font-weight:950">#${idx+1}</div>
                    <div style="font-size:18px">${escapeHtml(r.team.icon)}</div>
                    <div style="font-weight:900">
                      ${escapeHtml(r.team.name)}
                      ${renderTop5Badges(r.team, nightId)}
                      ${r.hot ? `<span class="hotBadge">🔥 HOT</span>` : ""}
                    </div>
                  </div>
                  <div style="font-weight:950">${r.total}</div>
                </div>
              `).join("")}
            </div>

            <div class="mutebox" style="margin-top:12px">
              Cache? Apri il link con <span class="mono">?v=1</span> (o numero a caso) per forzare aggiornamento.
            </div>
          </div>
        </div>
      `;
    }

    function renderSerata(nightStandings){
      return `
        <div class="card">
          <div class="title">
            <div class="ibox">📅</div>
            <div>
              <div class="t1">Classifica serata</div>
              <div class="t2">Legge i punti da <span class="mono">ADMIN_POINTS.${nightId}</span> nel codice. HOT: ≥ ${HOT_THRESHOLD}.</div>
            </div>
          </div>

          <div class="nightBtns">
            ${NIGHTS.map(n=>`
              <button class="nightBtn ${nightId===n.id?"active":""}" data-night="${n.id}">${escapeHtml(n.label)}</button>
            `).join("")}
          </div>

          <div style="margin-top:14px; display:flex; flex-direction:column; gap:10px">
            ${nightStandings.map((r,idx)=>`
              <div class="rankRow ${podiumClass(idx)}" data-teamrow="1" data-teamname="${escapeAttr(r.team.name)}">
                <div class="teamLeft">
                  <div class="teamIcon">${escapeHtml(r.team.icon)}</div>
                  <div>
                    <div style="font-weight:950">
                      #${idx+1} — ${escapeHtml(r.team.name)}
                      ${medalBadge(idx)}
                      ${renderTop5Badges(r.team, nightId)}
                      ${r.hot ? `<span class="hotBadge">🔥 HOT</span>` : ""}
                    </div>
                    <div class="small">Cap: <span class="mono" style="font-weight:900">${escapeHtml(r.team.captain||"—")}</span></div>
                  </div>
                </div>
                <div class="big">${r.total}</div>
              </div>
            `).join("")}
          </div>

          <div class="mutebox" style="margin-top:12px">
            Vuoi aggiornare i punti? Vai su GitHub → <b>index.html</b> → modifica la sezione <span class="mono">ADMIN_POINTS</span> → Commit.
          </div>
        </div>
      `;
    }

    function renderAdminHelp(){
      return `
        <div class="grid cols2">
          <div class="card">
            <div class="title">
              <div class="ibox">🛠️</div>
              <div>
                <div class="t1">Come aggiorni i punteggi</div>
                <div class="t2">Modifica <span class="mono">ADMIN_POINTS</span> + <span class="mono">ADMIN_TOP5</span> e fai Commit.</div>
              </div>
            </div>

            <div class="mutebox">
              <b>Esempio (Serata 1):</b><br><br>
              <span class="mono">const ADMIN_POINTS = {<br>
              &nbsp;&nbsp;n1: {<br>
              &nbsp;&nbsp;&nbsp;&nbsp;"ARISA": 14,<br>
              &nbsp;&nbsp;&nbsp;&nbsp;"Raf": 7,<br>
              &nbsp;&nbsp;&nbsp;&nbsp;"Enrico Nigiotti": -5<br>
              &nbsp;&nbsp;},<br>
              &nbsp;&nbsp;n2: {}, n3: {}, n4: {}, n5: {}<br>
              };</span><br><br>
              <b>TOP 5 ufficiale Sanremo:</b> compila <span class="mono">ADMIN_TOP5.${nightId}</span> con i 5 artisti della serata.<br>
              Ogni artista in top 5 dà <b>+${TOP5_BONUS}</b> alla squadra; se è il Capitano il bonus top 5 vale <b>+${TOP5_BONUS*2}</b>.<br>
              HOT scatta a <b>${HOT_THRESHOLD}</b> in una serata.
            </div>
          </div>
        </div>
      `;
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function escapeAttr(str){ return escapeHtml(str).replaceAll("\n"," "); }

    // ==========
    // Easter egg: triple tap on "Ghigliottina"
    // ==========
    let ghCount = 0;
    let ghTimer = null;
    document.addEventListener("click", (e)=>{
      const row = e.target.closest("[data-teamrow='1']");
      if(!row) return;
      const teamName = row.getAttribute("data-teamname") || "";
      if(norm(teamName) !== "ghigliottina") return;

      ghCount++;
      clearTimeout(ghTimer);
      ghTimer = setTimeout(()=> ghCount = 0, 900);

      if(ghCount >= 3){
        ghCount = 0;
        startGhigliottinaGame();
      }
    });

    function startGhigliottinaGame(){
      const overlay = document.createElement("div");
      overlay.className = "gameOverlay";
      overlay.innerHTML = `
        <div class="gameTopbar">
          <div class="gameTitle">🪓 Ghigliottina — MiniGame (Game&Watch)</div>
          <div class="gameBtns">
            <div class="gameHud" id="gameHud">Score: 0 · Miss: 0/5</div>
            <button class="gameBtn" id="btnExit">Esci ✖</button>
          </div>
        </div>
        <canvas class="gameCanvas" id="gameCanvas"></canvas>
        <div class="touchPad">
          <button class="gameBtn" id="btnLeft">◀</button>
          <button class="gameBtn" id="btnRight">▶</button>
        </div>
      `;
      document.body.appendChild(overlay);

      const canvas = overlay.querySelector("#gameCanvas");
      const ctx = canvas.getContext("2d", { alpha: false });
      const hud = overlay.querySelector("#gameHud");
      const btnExit = overlay.querySelector("#btnExit");

      function resize(){
        const topbarH = overlay.querySelector(".gameTopbar").offsetHeight;
        const w = window.innerWidth;
        const h = window.innerHeight - topbarH;
        canvas.width = Math.floor(w * devicePixelRatio);
        canvas.height = Math.floor(h * devicePixelRatio);
        canvas.style.height = h + "px";
        canvas.style.width = w + "px";
        ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      }
      resize();
      window.addEventListener("resize", resize);

      let running = true;
      let playerX = window.innerWidth / 2;
      const playerY = () => (canvas.clientHeight - 90);
      const playerSpeed = 9;
      const cards = [];
      let score = 0;
      let miss = 0;
      let spawnT = 0;

      let leftHeld = false;
      let rightHeld = false;

      const btnLeft = overlay.querySelector("#btnLeft");
      const btnRight = overlay.querySelector("#btnRight");

      const holdStart = (which)=> (e)=>{ e.preventDefault(); if(which==="L") leftHeld=true; else rightHeld=true; };
      const holdEnd = (which)=> (e)=>{ e.preventDefault(); if(which==="L") leftHeld=false; else rightHeld=false; };

      btnLeft.addEventListener("touchstart", holdStart("L"), {passive:false});
      btnLeft.addEventListener("touchend", holdEnd("L"), {passive:false});
      btnLeft.addEventListener("touchcancel", holdEnd("L"), {passive:false});
      btnRight.addEventListener("touchstart", holdStart("R"), {passive:false});
      btnRight.addEventListener("touchend", holdEnd("R"), {passive:false});
      btnRight.addEventListener("touchcancel", holdEnd("R"), {passive:false});

      btnLeft.addEventListener("mousedown", ()=> leftHeld=true);
      btnLeft.addEventListener("mouseup", ()=> leftHeld=false);
      btnLeft.addEventListener("mouseleave", ()=> leftHeld=false);
      btnRight.addEventListener("mousedown", ()=> rightHeld=true);
      btnRight.addEventListener("mouseup", ()=> rightHeld=false);
      btnRight.addEventListener("mouseleave", ()=> rightHeld=false);

      function onKey(e){
        if(e.key === "ArrowLeft") leftHeld = (e.type==="keydown");
        if(e.key === "ArrowRight") rightHeld = (e.type==="keydown");
        if(e.key === "Escape") exit();
      }
      window.addEventListener("keydown", onKey);
      window.addEventListener("keyup", onKey);

      function exit(){
        running = false;
        window.removeEventListener("resize", resize);
        window.removeEventListener("keydown", onKey);
        window.removeEventListener("keyup", onKey);
        overlay.remove();
      }
      btnExit.addEventListener("click", exit);

      function spawnCard(){
        const x = Math.random() * (window.innerWidth - 40) + 20;
        const speed = 3.2 + Math.random() * 2.2;
        cards.push({ x, y: -20, vy: speed, w: 18, h: 24 });
      }

      function drawBaldMan(x, y){
        ctx.fillStyle = "rgba(255,255,255,.92)";
        ctx.beginPath(); ctx.arc(x, y, 18, 0, Math.PI*2); ctx.fill();
        ctx.fillRect(x-12, y+18, 24, 26);
        ctx.fillStyle = "rgba(0,0,0,.12)";
        ctx.beginPath(); ctx.arc(x-6, y-6, 6, 0, Math.PI*2); ctx.fill();
      }

      function drawCard(c){
        ctx.fillStyle = "#2f7dff";
        ctx.fillRect(c.x - c.w/2, c.y - c.h/2, c.w, c.h);
        ctx.fillStyle = "rgba(255,255,255,.65)";
        ctx.fillRect(c.x - c.w/2 + 4, c.y - c.h/2 + 5, c.w-8, 4);
      }

      function loop(ts){
        if(!running) return;
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, window.innerWidth, canvas.clientHeight);

        ctx.fillStyle = "rgba(255,255,255,.12)";
        for(let i=0;i<18;i++){
          const sx = (i*97 + (ts/20)) % window.innerWidth;
          const sy = (i*53 + (ts/35)) % canvas.clientHeight;
          ctx.fillRect(sx, sy, 2, 2);
        }

        if(leftHeld) playerX -= playerSpeed;
        if(rightHeld) playerX += playerSpeed;
        playerX = Math.max(20, Math.min(window.innerWidth - 20, playerX));

        spawnT += 1;
        if(spawnT % 28 === 0) spawnCard();

        const py = playerY();
        for(let i=cards.length-1;i>=0;i--){
          const c = cards[i];
          c.y += c.vy;

          const hit = Math.abs(c.x - playerX) < 22 && Math.abs(c.y - (py+16)) < 28;
          if(hit){ score++; cards.splice(i,1); continue; }
          if(c.y > canvas.clientHeight + 40){ miss++; cards.splice(i,1); continue; }
        }

        for(const c of cards) drawCard(c);
        drawBaldMan(playerX, py);
        hud.textContent = `Score: ${score} · Miss: ${miss}/5`;

        if(miss >= 5){
          ctx.fillStyle = "rgba(0,0,0,.55)";
          ctx.fillRect(0, 0, window.innerWidth, canvas.clientHeight);
          ctx.fillStyle = "rgba(255,255,255,.95)";
          ctx.font = "900 34px ui-sans-serif, system-ui";
          ctx.fillText("GAME OVER", window.innerWidth/2 - 105, canvas.clientHeight/2 - 6);
          running = false;
          setTimeout(exit, 1600);
          return;
        }

        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    }

    // boot
    renderApp();
  </script>
</body>
</html>

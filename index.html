<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SVT Official FantaSanremo</title>

<style>
:root{
  --bg1:#0b0016;
  --bg2:#1a0033;
  --line:rgba(255,255,255,.15);
  --text:rgba(255,255,255,.95);
  --muted:rgba(255,255,255,.65);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
  color:var(--text);
  background:
    radial-gradient(1000px 500px at 20% 10%, rgba(255,0,200,.25), transparent 60%),
    radial-gradient(900px 600px at 80% 20%, rgba(0,200,255,.2), transparent 60%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
}

.wrap{max-width:1100px;margin:0 auto;padding:30px 16px 60px}

h1{
  font-size:46px;
  font-weight:900;
  margin:0 0 30px 0;
  background:linear-gradient(90deg,#fff,#ff4fd8,#00d0ff,#fff);
  -webkit-background-clip:text;
  color:transparent;
}

.card{
  background:rgba(255,255,255,.06);
  border:1px solid var(--line);
  border-radius:24px;
  padding:20px;
  backdrop-filter:blur(10px);
}

.rank{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-radius:18px;
  margin-bottom:10px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.15);
  transition:.2s;
}

.rank:hover{transform:translateY(-2px)}

.podium1{animation:glow1 2s infinite alternate}
.podium2{animation:glow2 2s infinite alternate}
.podium3{animation:glow3 2s infinite alternate}

@keyframes glow1{from{box-shadow:0 0 0px gold}to{box-shadow:0 0 25px gold}}
@keyframes glow2{from{box-shadow:0 0 0px silver}to{box-shadow:0 0 20px silver}}
@keyframes glow3{from{box-shadow:0 0 0px #cd7f32}to{box-shadow:0 0 20px #cd7f32}}

.hot{
  margin-left:8px;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  background:#ff0000;
  animation:blink 1s infinite alternate;
}

@keyframes blink{
  from{opacity:1}
  to{opacity:.5}
}

.tabs{display:flex;gap:10px;margin-bottom:20px}
.tab{
  padding:10px 14px;
  border-radius:16px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.08);
  cursor:pointer;
  font-weight:700;
}
.tab.active{background:linear-gradient(135deg,#ff4fd8,#00d0ff)}

button{cursor:pointer}

canvas{display:block}
</style>
</head>

<body>
<div class="wrap">
<h1>SVT Official FantaSanremo</h1>

<div class="tabs">
<button class="tab active" onclick="switchTab('tot')" id="tabTot">Classifica</button>
<button class="tab" onclick="switchTab('n1')" id="tabN1">Serata 1</button>
<button class="tab" onclick="switchTab('n2')" id="tabN2">Serata 2</button>
<button class="tab" onclick="switchTab('n3')" id="tabN3">Serata 3</button>
<button class="tab" onclick="switchTab('n4')" id="tabN4">Serata 4</button>
<button class="tab" onclick="switchTab('n5')" id="tabN5">Finale</button>
</div>

<div id="content"></div>
</div>

<script>

const teams=[
{name:"Geberit",icon:"🚽",cap:"DARGEN D’AMICO",roster:["DARGEN D’AMICO","Malika Ayane","lda & Aka7"]},
{name:"Ghigliottina",icon:"🪓",cap:"MARIA ANTONIETTA & COLOMBRE",roster:["MARIA ANTONIETTA & COLOMBRE","Tredici Pietro","Levante"]},
{name:"Mud Max",icon:"🏜️",cap:"SAYF",roster:["SAYF","Mara Sattei","Ditonellapiaga"]},
{name:"Sunday Bini",icon:"🍹",cap:"SAL DA VINCI",roster:["SAL DA VINCI","Samurai Jack","Eddie Brock"]},
{name:"OpenAi Collective",icon:"🤖",cap:"FEDEZ & MASINI",roster:["FEDEZ & MASINI","Ermal Meta","Fulminacci"]},
{name:"Bradbury",icon:"📚",cap:"TOMMASO PARADISO",roster:["TOMMASO PARADISO","Patty Pravo","Bambole di pezza"]},
{name:"Branca Menta",icon:"🍃",cap:"SERENA BRANCALE",roster:["SERENA BRANCALE","Nayf","Michele Bravi"]},
{name:"Eclissi",icon:"🌑",cap:"ARISA",roster:["ARISA","Chiello","Elettra Lamborghini"]},
{name:"I Gasati",icon:"⛽",cap:"LEO GASSMAN",roster:["LEO GASSMAN","Raf","Jax"]},
{name:"Tempo Libero: Rolex",icon:"⌚",cap:"FRANCESCO RENGA",roster:["FRANCESCO RENGA","Luché","Enrico Nigiotti"]}
];

const points={
n1:{},n2:{},n3:{},n4:{},n5:{}
};

let current="tot";

function computeNight(team,id){
let sum=0;
team.roster.forEach(a=>sum+=points[id][a]||0);
sum+=(points[id][team.cap]||0);
return sum;
}

function computeTotal(team){
let tot=0;
["n1","n2","n3","n4","n5"].forEach(id=>tot+=computeNight(team,id));
return tot;
}

function render(){
const content=document.getElementById("content");
let data=[];

if(current==="tot"){
data=teams.map(t=>({team:t,score:computeTotal(t)}));
}else{
data=teams.map(t=>({team:t,score:computeNight(t,current)}));
}

data.sort((a,b)=>b.score-a.score);

content.innerHTML='<div class="card">'+
data.map((r,i)=>{
let podiumClass="";
if(i===0)podiumClass="podium1";
if(i===1)podiumClass="podium2";
if(i===2)podiumClass="podium3";

return `<div class="rank ${podiumClass}" data-team="${r.team.name}">
<div>${i+1}. ${r.team.icon} ${r.team.name} ${r.score>=150?'<span class="hot">🔥 HOT</span>':''}</div>
<div style="font-weight:900;font-size:20px">${r.score}</div>
</div>`;
}).join("")+'</div>';

attachGhigliottina();
}

function switchTab(t){
current=t;
document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
document.getElementById("tab"+(t==="tot"?"Tot":t.toUpperCase())).classList.add("active");
render();
}

function attachGhigliottina(){
let count=0;
let timer=null;

document.querySelectorAll("[data-team='Ghigliottina']").forEach(el=>{
el.onclick=()=>{
count++;
clearTimeout(timer);
timer=setTimeout(()=>count=0,800);
if(count===3){startGame();count=0;}
};
});
}

function startGame(){
const overlay=document.createElement("div");
overlay.style.position="fixed";
overlay.style.inset="0";
overlay.style.background="black";
overlay.style.zIndex="9999";
document.body.appendChild(overlay);

const canvas=document.createElement("canvas");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
overlay.appendChild(canvas);

const ctx=canvas.getContext("2d");

let playerX=canvas.width/2;
let score=0;
let miss=0;
const cards=[];

document.addEventListener("mousemove",e=>playerX=e.clientX);

setInterval(()=>cards.push({x:Math.random()*canvas.width,y:-20}),800);

function loop(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(playerX,canvas.height-60,20,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="blue";
for(let i=cards.length-1;i>=0;i--){
cards[i].y+=4;
ctx.fillRect(cards[i].x,cards[i].y,15,20);
if(cards[i].y>canvas.height-80 && cards[i].x>playerX-20 && cards[i].x<playerX+20){
score++;cards.splice(i,1);
}else if(cards[i].y>canvas.height){
miss++;cards.splice(i,1);
}
}

ctx.fillStyle="white";
ctx.fillText("Score:"+score,20,40);
ctx.fillText("Miss:"+miss,20,70);

if(miss>=5){overlay.remove();return;}
requestAnimationFrame(loop);
}
loop();
}

render();

</script>
</body>
</html>

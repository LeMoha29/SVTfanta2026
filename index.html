<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SVT Official FantaSanremo — Glitter Pop</title>
  <meta name="theme-color" content="#120026" />
  <style>
    :root{
      --bgA:#0b0016;
      --bgB:#13002a;
      --card: rgba(255,255,255,.10);
      --card2: rgba(255,255,255,.14);
      --line: rgba(255,255,255,.16);
      --ink: rgba(255,255,255,.93);
      --muted: rgba(255,255,255,.65);
      --pink:#ff4fd8;
      --violet:#7c3aed;
      --cyan:#22d3ee;
      --gold:#ffd36e;
      --shadow: 0 18px 60px rgba(0,0,0,.35);
      --r: 26px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(255,79,216,.25), transparent 60%),
        radial-gradient(1000px 600px at 80% 20%, rgba(34,211,238,.18), transparent 60%),
        radial-gradient(900px 700px at 50% 90%, rgba(124,58,237,.20), transparent 60%),
        linear-gradient(180deg, var(--bgA), var(--bgB));
      overflow-x:hidden;
    }
    .sparkle{
      position:fixed; inset:0; pointer-events:none; opacity:.35;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.9) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 70% 18%, rgba(255,255,255,.8) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 35% 75%, rgba(255,255,255,.7) 40%, transparent 45%),
        radial-gradient(2px 2px at 85% 65%, rgba(255,255,255,.75) 40%, transparent 45%),
        radial-gradient(1.2px 1.2px at 55% 45%, rgba(255,255,255,.6) 40%, transparent 45%);
      filter: blur(.2px);
      animation: tw 6s ease-in-out infinite alternate;
    }
    @keyframes tw{ from{opacity:.25} to{opacity:.45} }

    .wrap{max-width:1150px; margin:0 auto; padding:26px 16px 70px;}
    .top{
      display:flex; gap:12px; flex-wrap:wrap;
      align-items:flex-end; justify-content:space-between;
      margin-bottom:16px;
    }
    .brand{display:flex; flex-direction:column; gap:10px;}
    .badge{
      display:inline-flex; align-items:center; gap:10px;
      padding:8px 12px; border-radius:999px;
      border:1px solid var(--line);
      background: linear-gradient(135deg, rgba(255,79,216,.18), rgba(34,211,238,.12));
      box-shadow: 0 10px 30px rgba(255,79,216,.08);
      font-size:12px; font-weight:900; letter-spacing:.03em;
    }
    .h1{
      font-size:34px; font-weight:950; letter-spacing:-.03em;
      margin:0;
      background: linear-gradient(90deg, #fff, rgba(255,79,216,.95), rgba(34,211,238,.95), #fff);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      text-shadow: 0 0 30px rgba(255,79,216,.08);
    }
    .sub{color: var(--muted); font-size:13px; margin-top:4px; max-width: 70ch;}
    .pills{display:flex; gap:8px; flex-wrap:wrap}
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 12px; border-radius:999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      font-size:12px; font-weight:850; color: rgba(255,255,255,.82);
    }
    .actions{display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;}
    .btn{
      padding:10px 14px;
      border-radius:18px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--ink);
      font-weight:900;
      cursor:pointer;
      box-shadow: 0 10px 28px rgba(0,0,0,.18);
      transition: transform .08s ease, background .18s ease, border-color .18s ease;
      user-select:none;
    }
    .btn:hover{ background: rgba(255,255,255,.10); border-color: rgba(255,255,255,.22) }
    .btn:active{ transform: scale(.98) }
    .btn.primary{
      border-color: rgba(255,79,216,.55);
      background: linear-gradient(135deg, rgba(255,79,216,.22), rgba(124,58,237,.18));
    }
    .btn.danger{
      border-color: rgba(255,90,90,.65);
      background: linear-gradient(135deg, rgba(255,90,90,.22), rgba(255,79,216,.12));
    }
    .btn.ghost{ background: transparent; box-shadow:none; }

    .banner{
      border-radius: var(--r);
      padding:14px 16px;
      border:1px solid rgba(255,90,90,.35);
      background: rgba(255,90,90,.10);
      color: rgba(255,220,220,.95);
      box-shadow: var(--shadow);
      margin: 14px 0 16px;
    }

    .tabs{display:flex; gap:10px; flex-wrap:wrap; margin: 16px 0}
    .tab{
      padding:10px 14px;
      border-radius:18px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      font-weight:950;
      cursor:pointer;
      transition: background .18s ease;
    }
    .tab.active{
      background: linear-gradient(135deg, rgba(34,211,238,.22), rgba(255,79,216,.22));
      border-color: rgba(255,255,255,.25);
    }

    .grid{display:grid; gap:16px}
    @media(min-width:980px){ .cols2{grid-template-columns: 1.15fr .85fr} }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border:1px solid var(--line);
      border-radius: var(--r);
      padding:18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .title{display:flex; align-items:center; gap:10px; margin-bottom:12px}
    .ibox{
      width:36px; height:36px; border-radius:16px;
      display:flex; align-items:center; justify-content:center;
      font-weight:950;
      background: linear-gradient(135deg, rgba(255,79,216,.35), rgba(34,211,238,.28));
      border:1px solid rgba(255,255,255,.22);
    }
    .t1{font-size:18px; font-weight:950; letter-spacing:-.01em}
    .t2{font-size:13px; color:var(--muted); margin-top:2px}

    .rankRow{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.14);
      border-radius: 18px;
      position:relative;
      overflow:hidden;
      transition: transform .2s ease;
    }
    .rankRow:hover{ transform: translateY(-1px); }
    .teamLeft{display:flex; align-items:center; gap:10px}
    .teamIcon{
      width:44px; height:44px; border-radius:18px;
      display:flex; align-items:center; justify-content:center;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      font-size:20px;
      flex:0 0 auto;
    }
    .small{font-size:12px; color:var(--muted)}
    .big{font-size:20px; font-weight:950}

    /* Podio animato */
    .podium-1::before, .podium-2::before, .podium-3::before{
      content:"";
      position:absolute; inset:-2px;
      border-radius: 20px;
      opacity:.45;
      filter: blur(0px);
      pointer-events:none;
    }
    .podium-1{
      border-color: rgba(255, 211, 110, .35);
      background: linear-gradient(180deg, rgba(255,211,110,.18), rgba(0,0,0,.12));
      box-shadow: 0 0 0 1px rgba(255,211,110,.12), 0 16px 40px rgba(255,211,110,.10);
      animation: glow1 1.8s ease-in-out infinite alternate;
    }
    .podium-1::before{
      background: radial-gradient(600px 200px at 20% 20%, rgba(255,211,110,.35), transparent 60%),
                  radial-gradient(500px 160px at 80% 30%, rgba(255,79,216,.22), transparent 60%);
    }
    .podium-2{
      border-color: rgba(200, 210, 230, .28);
      background: linear-gradient(180deg, rgba(200,210,230,.14), rgba(0,0,0,.12));
      animation: glow2 2.2s ease-in-out infinite alternate;
    }
    .podium-2::before{
      background: radial-gradient(600px 200px at 30% 20%, rgba(200,210,230,.25), transparent 60%),
                  radial-gradient(500px 160px at 70% 30%, rgba(34,211,238,.16), transparent 60%);
    }
    .podium-3{
      border-color: rgba(255, 167, 120, .25);
      background: linear-gradient(180deg, rgba(255,167,120,.14), rgba(0,0,0,.12));
      animation: glow3 2.6s ease-in-out infinite alternate;
    }
    .podium-3::before{
      background: radial-gradient(600px 200px at 30% 20%, rgba(255,167,120,.22), transparent 60%),
                  radial-gradient(500px 160px at 70% 30%, rgba(124,58,237,.14), transparent 60%);
    }
    @keyframes glow1{ from{transform:translateY(0)} to{transform:translateY(-1px)} }
    @keyframes glow2{ from{transform:translateY(0)} to{transform:translateY(-1px)} }
    @keyframes glow3{ from{transform:translateY(0)} to{transform:translateY(-1px)} }

    /* Animazione cambio classifica */
    .bump{ animation: bump .38s ease-out; }
    @keyframes bump{ 0%{transform:translateY(8px);opacity:.65} 100%{transform:translateY(0);opacity:1} }

    .medal{
      font-weight:950;
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-left:8px;
      white-space:nowrap;
    }

    .input, textarea{
      width:100%;
      padding:10px 12px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color: var(--ink);
      outline:none;
    }
    textarea{min-height:96px; resize:vertical}
    .input:focus, textarea:focus{
      border-color: rgba(34,211,238,.40);
      box-shadow: 0 0 0 3px rgba(34,211,238,.12);
    }

    .row2{display:grid; gap:10px; grid-template-columns: 1fr}
    @media(min-width:780px){ .row2{ grid-template-columns: 1fr 1fr; } }

    .nightBtns{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
    .nightBtn{
      padding:8px 10px; border-radius:16px;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.14);
      color: var(--ink);
      font-weight:900; cursor:pointer;
    }
    .nightBtn.active{
      background: linear-gradient(135deg, rgba(255,79,216,.22), rgba(34,211,238,.18));
      border-color: rgba(255,255,255,.25);
    }

    .mutebox{
      padding:12px; border-radius:18px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.14);
      color: var(--muted);
      font-size:13px;
      line-height:1.35;
    }
    .footer{
      margin-top:18px; text-align:center; font-size:12px; color: rgba(255,255,255,.55)
    }
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace}

    .kpi{
      display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;
    }

    /* Toast */
    .toast{
      position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
      background: rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.9);
      padding:10px 12px;
      border-radius: 16px;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
      font-weight:900;
      opacity:0;
      pointer-events:none;
      transition: opacity .2s ease, transform .2s ease;
    }
    .toast.show{
      opacity:1;
      transform: translateX(-50%) translateY(-6px);
    }
  </style>
</head>

<body>
  <div class="sparkle"></div>
  <div id="app"></div>
  <div id="toast" class="toast"></div>

  <script>
    // ==========
    // Config
    // ==========
    const STORAGE_KEY = "svt_fanta_glitter_v2";

    const NIGHTS = [
      { id: "n1", label: "Serata 1" },
      { id: "n2", label: "Serata 2" },
      { id: "n3", label: "Serata 3" },
      { id: "n4", label: "Serata 4" },
      { id: "n5", label: "Finale" },
    ];

    const PRESET_TEAMS = [
      { name: "Geberit", icon: "🚽", captain: "DARGEN D’AMICO", roster: ["DARGEN D’AMICO","Malika Ayane","lda & Aka7"] },
      { name: "Ghigliottina", icon: "🪓", captain: "MARIA ANTONIETTA & COLOMBRE", roster: ["MARIA ANTONIETTA & COLOMBRE","Tredici Pietro","Levante"] },
      { name: "Mud Max", icon: "🏜️", captain: "SAYF", roster: ["SAYF","Mara Sattei","Ditonellapiaga"] },
      { name: "Sunday Bini", icon: "🍹", captain: "SAL DA VINCI", roster: ["SAL DA VINCI","Samurai Jack","Eddie Brock"] },
      { name: "OpenAi Collective", icon: "🤖", captain: "FEDEZ & MASINI", roster: ["FEDEZ & MASINI","Ermal Meta","Fulminacci"] },
      { name: "Bradbury", icon: "📚", captain: "TOMMASO PARADISO", roster: ["TOMMASO PARADISO","Patty Pravo","Bambole di pezza"] },
      { name: "Branca Menta", icon: "🍃", captain: "SERENA BRANCALE", roster: ["SERENA BRANCALE","Nayf","Michele Bravi"] },
      { name: "Eclissi", icon: "🌑", captain: "ARISA", roster: ["ARISA","Chiello","Elettra Lamborghini"] },
      { name: "I Gasati", icon: "⛽", captain: "LEO GASSMAN", roster: ["LEO GASSMAN","Raf","Jax"] },
      { name: "Tempo Libero: Rolex", icon: "⌚", captain: "FRANCESCO RENGA", roster: ["FRANCESCO RENGA","Luché","Enrico Nigiotti"] },
    ];

    const HOMERULES = [
      { id:"excl", title:"Esclusività artista", desc:"Ogni cantante può appartenere a una sola squadra (bloccante)." },
      { id:"cap2", title:"Capitano x2", desc:"Il Capitano vale doppio sui punti della serata (automatico)." }
    ];

    // ==========
    // Utils
    // ==========
    const uid = (p="id") => `${p}_${Math.random().toString(16).slice(2)}_${Date.now().toString(16)}`;
    const clamp = (x) => (Number.isFinite(Number(x)) ? Number(x) : 0);
    const norm = (s) => String(s||"").trim().replace(/\s+/g," ").toLowerCase();

    function toast(msg){
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(()=> el.classList.remove("show"), 1600);
    }

    function safeLoad(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(raw) return JSON.parse(raw);
      }catch(e){ /* ignore */ }
      return null;
    }
    function safeSave(data){
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }catch(e){ /* ignore */ }
    }

    function initialState(){
      const teams = PRESET_TEAMS.map(t=>({
        id: uid("team"),
        name: t.name,
        icon: t.icon,
        roster: t.roster.slice(),
        captain: t.captain
      }));

      const nightData = {};
      for(const n of NIGHTS){
        nightData[n.id] = {
          mode: "byArtist",               // byArtist | manual
          artistPoints: {},               // { "Artist": 12 }
          teamManualTotals: {},           // { teamId: 123 }
          extra: {}                       // { teamId: 0 } optional
        };
      }

      return {
        leagueName: "SVT Official FantaSanremo",
        teams,
        nights: NIGHTS,
        homerules: HOMERULES,
        nightData
      };
    }

    function findRosterDuplicates(teams){
      const seen = new Map(); // normName -> {display, teams[]}
      for(const t of teams){
        for(const raw of (t.roster||[])){
          const key = norm(raw);
          if(!key) continue;
          const entry = seen.get(key) || { display: String(raw).trim(), teams: [] };
          if(!entry.teams.includes(t.name)) entry.teams.push(t.name);
          if(!entry.display) entry.display = String(raw).trim();
          seen.set(key, entry);
        }
      }
      const dupMap = {};
      for(const [k,v] of seen.entries()){
        if(v.teams.length>1) dupMap[k]=v;
      }
      return dupMap;
    }

    function getPoints(pointsMap, artist){
      if(pointsMap[artist] != null) return clamp(pointsMap[artist]);
      const key = norm(artist);
      if(!key) return 0;
      for(const [k,v] of Object.entries(pointsMap)){
        if(norm(k)===key) return clamp(v);
      }
      return 0;
    }

    function computeTeamNight(team, artistPoints, extra){
      let sum = 0;
      for(const a of (team.roster||[])) sum += getPoints(artistPoints, a);
      const capPts = getPoints(artistPoints, team.captain);
      sum += capPts; // captain x2
      sum += clamp(extra);
      return Math.round(sum*10)/10;
    }

    function computeStandings(state){
      const rows = state.teams.map(team=>{
        let total=0;
        for(const n of state.nights){
          const nd = state.nightData[n.id];
          const extra = clamp(nd.extra?.[team.id] ?? 0);
          if(nd.mode==="manual"){
            total += clamp(nd.teamManualTotals?.[team.id] ?? 0) + extra;
          } else {
            total += computeTeamNight(team, nd.artistPoints, extra);
          }
        }
        return { team, total: Math.round(total*10)/10 };
      });
      rows.sort((a,b)=>b.total-a.total);
      return rows;
    }

    function computeNightStandings(state, nightId){
      const nd = state.nightData[nightId];
      const rows = state.teams.map(team=>{
        const extra = clamp(nd.extra?.[team.id] ?? 0);
        const total = nd.mode==="manual"
          ? clamp(nd.teamManualTotals?.[team.id] ?? 0) + extra
          : computeTeamNight(team, nd.artistPoints, extra);
        return { team, total: Math.round(total*10)/10 };
      });
      rows.sort((a,b)=>b.total-a.total);
      return rows;
    }

    function exportJSON(state){
      const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `svt-fanta-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importJSON(cb){
      const input = document.createElement("input");
      input.type="file";
      input.accept="application/json";
      input.onchange = async (e)=>{
        const file = e.target.files?.[0];
        if(!file) return;
        const text = await file.text();
        try{
          const parsed = JSON.parse(text);
          cb(parsed);
          toast("Import OK ✨");
        }catch{
          toast("Import fallito 😵");
        }
      };
      input.click();
    }

    function parseBulkPoints(text){
      const lines = text.split(/\n+/).map(s=>s.trim()).filter(Boolean);
      const out = {};
      for(const line of lines){
        const m = line.match(/^(.*?)(?:\s*[=:]\s*|\s+)(-?\d+(?:\.\d+)?)$/);
        if(!m) continue;
        const name = m[1].trim();
        const pts = clamp(m[2]);
        if(name) out[name]=pts;
      }
      return out;
    }

    // ==========
    // UI rendering (vanilla)
    // ==========
    let state = safeLoad() || initialState();
    let tab = "classifica";
    let nightId = NIGHTS[0].id;
    let dupError = "";
    let lastTopKey = ""; // per animazioni

    function podiumClass(idx){
      if(idx===0) return "podium-1";
      if(idx===1) return "podium-2";
      if(idx===2) return "podium-3";
      return "";
    }
    function medalBadge(idx){
      if(idx===0) return `<span class="medal">🥇 1°</span>`;
      if(idx===1) return `<span class="medal">🥈 2°</span>`;
      if(idx===2) return `<span class="medal">🥉 3°</span>`;
      return "";
    }

    function renderApp(){
      const root = document.getElementById("app");

      const standings = computeStandings(state);
      const nightStandings = computeNightStandings(state, nightId);

      // Animazione: se cambia il podio generale, bump sui top3
      const newTopKey = standings.slice(0,3).map(r=>r.team.id).join("|");
      const podiumChanged = (newTopKey && newTopKey !== lastTopKey);
      lastTopKey = newTopKey;

      const pillsHtml = `
        <div class="kpi">
          <div class="pill">👥 ${state.teams.length} squadre</div>
          <div class="pill">📅 ${state.nights.length} serate</div>
          <div class="pill">👑 Cap x2</div>
          <div class="pill">🧷 Esclusività</div>
        </div>
      `;

      root.innerHTML = `
        <div class="wrap">
          <div class="top">
            <div class="brand">
              <div class="badge">✨ SVT League App • SANREMO GLITTER POP • (vanilla, ultra-stabile)</div>
              <h1 class="h1">${escapeHtml(state.leagueName)}</h1>
              <div class="sub">Homerules: esclusività artista (bloccante) + Capitano x2 (automatico) • Condivisione: Export/Import (no login)</div>
              ${pillsHtml}
            </div>
            <div class="actions">
              <button class="btn primary" id="btnExport">⬇️ Export</button>
              <button class="btn" id="btnImport">⬆️ Import</button>
              <button class="btn danger" id="btnReset">🗑️ Reset</button>
            </div>
          </div>

          ${dupError ? `
            <div class="banner">
              <div style="font-weight:950">Bloccato</div>
              <div style="margin-top:4px">${escapeHtml(dupError)}</div>
            </div>
          ` : ""}

          <div class="tabs">
            <button class="tab ${tab==="classifica"?"active":""}" data-tab="classifica">🏆 Classifica</button>
            <button class="tab ${tab==="serata"?"active":""}" data-tab="serata">📅 Serata</button>
            <button class="tab ${tab==="roster"?"active":""}" data-tab="roster">👥 Roster</button>
            <button class="tab ${tab==="homerules"?"active":""}" data-tab="homerules">✨ Homerules</button>
          </div>

          ${tab==="classifica" ? renderClassifica(standings, nightStandings, podiumChanged) : ""}
          ${tab==="serata" ? renderSerata(nightStandings) : ""}
          ${tab==="roster" ? renderRoster() : ""}
          ${tab==="homerules" ? renderHomerules() : ""}

          <div class="footer">SVT Official FantaSanremo — Glitter Pop • no install • no login • export/import per sincronizzare</div>
        </div>
      `;

      // Wiring
      document.querySelectorAll(".tab").forEach(b=>{
        b.addEventListener("click", ()=>{ tab = b.dataset.tab; renderApp(); });
      });

      document.getElementById("btnExport").addEventListener("click", ()=> exportJSON(state));
      document.getElementById("btnImport").addEventListener("click", ()=> importJSON((p)=>{ state = p; safeSave(state); dupError=""; renderApp(); }));
      document.getElementById("btnReset").addEventListener("click", ()=>{
        if(!confirm("Reset totale? Cancella dati salvati in questo browser.")) return;
        localStorage.removeItem(STORAGE_KEY);
        state = initialState();
        tab = "classifica";
        nightId = NIGHTS[0].id;
        dupError = "";
        toast("Reset OK");
        renderApp();
      });

      // Night buttons
      document.querySelectorAll("[data-night]").forEach(b=>{
        b.addEventListener("click", ()=>{
          nightId = b.dataset.night;
          renderApp();
        });
      });

      // Night mode
      document.querySelectorAll("[data-mode]").forEach(b=>{
        b.addEventListener("click", ()=>{
          state.nightData[nightId].mode = b.dataset.mode;
          safeSave(state);
          renderApp();
        });
      });

      // Serata handlers
      const bulkBtn = document.getElementById("bulkImport");
      if(bulkBtn){
        bulkBtn.addEventListener("click", ()=>{
          const ta = document.getElementById("bulkTA");
          const parsed = parseBulkPoints(ta.value);
          state.nightData[nightId].artistPoints = { ...state.nightData[nightId].artistPoints, ...parsed };
          safeSave(state);
          ta.value = "";
          toast("Punti importati ✨");
          renderApp();
        });
      }

      // Edit punti singoli
      document.querySelectorAll("[data-artist]").forEach(inp=>{
        inp.addEventListener("input", ()=>{
          const artist = inp.dataset.artist;
          state.nightData[nightId].artistPoints[artist] = clamp(inp.value);
          safeSave(state);
          // non rerender ad ogni battito (ma ok). Rerender leggero:
          renderApp();
        });
      });
      document.querySelectorAll("[data-del-artist]").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const artist = btn.dataset.delArtist;
          delete state.nightData[nightId].artistPoints[artist];
          safeSave(state);
          renderApp();
        });
      });

      // Manual totals + extra
      document.querySelectorAll("[data-manual]").forEach(inp=>{
        inp.addEventListener("input", ()=>{
          const teamId = inp.dataset.manual;
          state.nightData[nightId].teamManualTotals[teamId] = clamp(inp.value);
          safeSave(state);
          renderApp();
        });
      });
      document.querySelectorAll("[data-extra]").forEach(inp=>{
        inp.addEventListener("input", ()=>{
          const teamId = inp.dataset.extra;
          state.nightData[nightId].extra[teamId] = clamp(inp.value);
          safeSave(state);
          renderApp();
        });
      });

      // Roster editing + captain
      document.querySelectorAll("[data-cap]").forEach(inp=>{
        inp.addEventListener("input", ()=>{
          const teamId = inp.dataset.cap;
          const nextTeams = state.teams.map(t=> t.id===teamId ? {...t, captain: inp.value} : t);
          const dups = findRosterDuplicates(nextTeams);
          if(Object.keys(dups).length){
            dupError = formatDupError(dups);
            // blocca
            toast("Doppione artista: bloccato");
            renderApp();
            return;
          }
          dupError = "";
          state.teams = nextTeams;
          safeSave(state);
          renderApp();
        });
      });
      document.querySelectorAll("[data-roster]").forEach(ta=>{
        ta.addEventListener("input", ()=>{
          const teamId = ta.dataset.roster;
          const roster = ta.value.split(/\n+/).map(x=>x.trim()).filter(Boolean);
          const nextTeams = state.teams.map(t=> t.id===teamId ? {...t, roster} : t);
          const dups = findRosterDuplicates(nextTeams);
          if(Object.keys(dups).length){
            dupError = formatDupError(dups);
            toast("Doppione artista: bloccato");
            renderApp();
            return;
          }
          dupError = "";
          state.teams = nextTeams;
          safeSave(state);
          renderApp();
        });
      });
    }

    function formatDupError(dupMap){
      const keys = Object.keys(dupMap);
      const preview = keys.slice(0,3).map(k=>`${dupMap[k].display} (${dupMap[k].teams.join(" / ")})`).join(" · ");
      return `Regola ESCLUSIVITÀ: doppioni trovati. Risolvi prima di salvare. Esempio: ${preview}${keys.length>3?" …":""}`;
    }

    function renderClassifica(standings, nightStandings, podiumChanged){
      return `
        <div class="grid cols2">
          <div class="card">
            <div class="title">
              <div class="ibox">🏆</div>
              <div>
                <div class="t1">Classifica generale</div>
                <div class="t2">Somma di tutte le serate (manuale o per-artista). Podio animato ✨</div>
              </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:10px">
              ${standings.map((r,idx)=>{
                const podium = podiumClass(idx);
                const bump = podiumChanged && idx<3 ? "bump" : "";
                return `
                  <div class="rankRow ${podium} ${bump}">
                    <div class="teamLeft">
                      <div class="teamIcon">${escapeHtml(r.team.icon)}</div>
                      <div>
                        <div style="font-weight:950">#${idx+1} — ${escapeHtml(r.team.name)} ${medalBadge(idx)}</div>
                        <div class="small">Cap: <span class="mono" style="font-weight:900">${escapeHtml(r.team.captain||"—")}</span></div>
                      </div>
                    </div>
                    <div class="big">${r.total}</div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>

          <div class="card">
            <div class="title">
              <div class="ibox">📅</div>
              <div>
                <div class="t1">Focus serata</div>
                <div class="t2">Mini-classifica della serata selezionata.</div>
              </div>
            </div>

            <div class="nightBtns">
              ${state.nights.map(n=>`
                <button class="nightBtn ${nightId===n.id?"active":""}" data-night="${n.id}">${escapeHtml(n.label)}</button>
              `).join("")}
            </div>

            <div style="margin-top:12px; display:flex; flex-direction:column; gap:8px">
              ${nightStandings.slice(0,6).map((r,idx)=>`
                <div class="rankRow ${podiumClass(idx)}" style="padding:10px 12px">
                  <div class="teamLeft" style="gap:8px">
                    <div style="width:26px; font-weight:950">#${idx+1}</div>
                    <div style="font-size:18px">${escapeHtml(r.team.icon)}</div>
                    <div style="font-weight:900">${escapeHtml(r.team.name)}</div>
                  </div>
                  <div style="font-weight:950">${r.total}</div>
                </div>
              `).join("")}
            </div>

            <div class="mutebox" style="margin-top:12px">
              Modalità serata: <b>${state.nightData[nightId].mode==="manual" ? "Manuale" : "Per artista"}</b><br>
              Tip: per bucare la cache, aggiungi <span class="mono">?v=3</span> all’URL.
            </div>
          </div>
        </div>
      `;
    }

    function renderSerata(nightStandings){
      const nd = state.nightData[nightId];
      return `
        <div class="grid cols2">
          <div class="card">
            <div class="title">
              <div class="ibox">📅</div>
              <div>
                <div class="t1">Punteggi serata</div>
                <div class="t2">Incolla punti per artista oppure inserisci i totali.</div>
              </div>
            </div>

            <div class="nightBtns">
              ${state.nights.map(n=>`
                <button class="nightBtn ${nightId===n.id?"active":""}" data-night="${n.id}">${escapeHtml(n.label)}</button>
              `).join("")}
            </div>

            <div style="display:flex; gap:10px; margin-top:12px; flex-wrap:wrap">
              <button class="btn ${nd.mode==="byArtist"?"primary":""}" data-mode="byArtist">✅ Per artista</button>
              <button class="btn ${nd.mode==="manual"?"primary":""}" data-mode="manual">🧾 Manuale</button>
            </div>

            ${nd.mode==="byArtist" ? `
              <div class="mutebox" style="margin-top:14px">
                Incolla: <span class="mono"><b>Artista = 12</b></span> (una riga per artista). Match tollerante su maiuscole/minuscole e spazi.
              </div>

              <div style="margin-top:12px">
                <textarea id="bulkTA" placeholder="Esempio:
ARISA = 14
Raf: 7
Enrico Nigiotti -5"></textarea>
                <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap">
                  <button class="btn primary" id="bulkImport">✨ Importa righe</button>
                </div>
              </div>

              <div style="margin-top:12px; display:flex; flex-direction:column; gap:8px">
                ${Object.keys(nd.artistPoints||{}).length===0 ? `<div class="mutebox">Nessun artista inserito ancora.</div>` : ""}
                ${Object.entries(nd.artistPoints||{})
                  .sort((a,b)=>a[0].localeCompare(b[0]))
                  .map(([artist,pts])=>`
                    <div class="rankRow">
                      <div style="font-weight:900">${escapeHtml(artist)}</div>
                      <div style="display:flex; gap:8px; align-items:center">
                        <input class="input" style="width:140px" type="number" value="${pts}" data-artist="${escapeAttr(artist)}" />
                        <button class="btn" data-del-artist="${escapeAttr(artist)}">🗑️</button>
                      </div>
                    </div>
                  `).join("")}
              </div>
            ` : `
              <div class="mutebox" style="margin-top:14px">
                Modalità manuale: inserisci solo il totale per squadra (se lo calcolate voi).<br>
                Extra manuale: aggiustamenti rapidi (opzionale).
              </div>

              <div style="margin-top:14px; display:flex; flex-direction:column; gap:10px">
                ${state.teams.map(t=>`
                  <div class="rankRow" style="flex-direction:column; align-items:stretch; gap:10px">
                    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px">
                      <div class="teamLeft">
                        <div style="font-size:18px">${escapeHtml(t.icon)}</div>
                        <div style="font-weight:950">${escapeHtml(t.name)}</div>
                      </div>
                      <div style="width:170px">
                        <input class="input" type="number" placeholder="Totale"
                          value="${nd.teamManualTotals?.[t.id] ?? ""}" data-manual="${t.id}" />
                      </div>
                    </div>

                    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px">
                      <div class="small">Extra manuale (opzionale)</div>
                      <div style="width:170px">
                        <input class="input" type="number" placeholder="0"
                          value="${nd.extra?.[t.id] ?? ""}" data-extra="${t.id}" />
                      </div>
                    </div>
                  </div>
                `).join("")}
              </div>
            `}
          </div>

          <div class="card">
            <div class="title">
              <div class="ibox">🏆</div>
              <div>
                <div class="t1">Classifica serata</div>
                <div class="t2">Calcolata in base alla modalità selezionata. Podio animato ✨</div>
              </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:10px">
              ${nightStandings.map((r,idx)=>`
                <div class="rankRow ${podiumClass(idx)}">
                  <div class="teamLeft">
                    <div class="teamIcon">${escapeHtml(r.team.icon)}</div>
                    <div>
                      <div style="font-weight:950">#${idx+1} — ${escapeHtml(r.team.name)} ${medalBadge(idx)}</div>
                      <div class="small">${nd.mode==="manual" ? "Totale inserito a mano" : `Roster: ${(r.team.roster||[]).length} · Cap: ${escapeHtml(r.team.captain||"—")}`}</div>
                    </div>
                  </div>
                  <div class="big">${r.total}</div>
                </div>
              `).join("")}
            </div>

            <div class="mutebox" style="margin-top:12px">
              <b>Tip da festival:</b> per evitare mismatch, copia i nomi dai roster (match tollerante ma sempre meglio).
            </div>
          </div>
        </div>
      `;
    }

    function renderRoster(){
      return `
        <div class="grid cols2">
          <div class="card">
            <div class="title">
              <div class="ibox">👥</div>
              <div>
                <div class="t1">Roster squadre</div>
                <div class="t2">Già precompilate. L’esclusività è bloccante.</div>
              </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:12px">
              ${state.teams.map(t=>`
                <div class="card" style="background: rgba(0,0,0,.14); border-color: rgba(255,255,255,.14)">
                  <div style="display:flex; justify-content:space-between; align-items:center; gap:10px">
                    <div class="teamLeft">
                      <div class="teamIcon">${escapeHtml(t.icon)}</div>
                      <div>
                        <div style="font-weight:950">${escapeHtml(t.name)}</div>
                        <div class="small">Artisti in roster: ${(t.roster||[]).length}</div>
                      </div>
                    </div>
                  </div>

                  <div class="row2" style="margin-top:12px">
                    <div>
                      <div class="small" style="font-weight:900; margin-bottom:6px">Capitano (x2)</div>
                      <input class="input" placeholder="Nome artista"
                        value="${escapeAttr(t.captain||"")}" data-cap="${t.id}" />
                    </div>
                    <div>
                      <div class="small" style="font-weight:900; margin-bottom:6px">Icona (emoji)</div>
                      <input class="input" value="${escapeAttr(t.icon||"")}" disabled />
                    </div>
                  </div>

                  <div style="margin-top:12px">
                    <div class="small" style="font-weight:900; margin-bottom:6px">Roster (uno per riga)</div>
                    <textarea class="input" data-roster="${t.id}">${escapeHtml((t.roster||[]).join("\n"))}</textarea>
                  </div>

                  <div class="kpi" style="margin-top:10px">
                    <div class="pill">👑 Cap x2</div>
                    <div class="pill">🧷 Esclusività</div>
                  </div>
                </div>
              `).join("")}
            </div>
          </div>

          <div class="card">
            <div class="title">
              <div class="ibox">📌</div>
              <div>
                <div class="t1">Condivisione nel gruppo</div>
                <div class="t2">Zero login: usate Export/Import.</div>
              </div>
            </div>

            <div class="mutebox">
              <b>Flusso perfetto:</b><br>
              • 1 admin inserisce punti/serate<br>
              • fa <b>Export</b> e manda il file nel gruppo<br>
              • gli altri fanno <b>Import</b> e vedono la stessa classifica.
            </div>

            <div class="mutebox" style="margin-top:12px">
              <b>Debug info (se qualcosa non va):</b><br>
              • Se vedi bianco: aggiungi <span class="mono">?v=3</span> all’URL<br>
              • Se ancora bianco: controlla che <span class="mono">index.html</span> sia in root.
            </div>
          </div>
        </div>
      `;
    }

    function renderHomerules(){
      return `
        <div class="grid cols2">
          <div class="card">
            <div class="title">
              <div class="ibox">✨</div>
              <div>
                <div class="t1">Homerules SVT</div>
                <div class="t2">Solo 2 regole, semplici e cattive.</div>
              </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:10px">
              ${state.homerules.map(r=>`
                <div class="rankRow">
                  <div>
                    <div style="font-weight:950">${escapeHtml(r.title)}</div>
                    <div class="small">${escapeHtml(r.desc)}</div>
                  </div>
                  <div style="font-weight:950">OK</div>
                </div>
              `).join("")}
            </div>

            <div class="mutebox" style="margin-top:12px">
              Esclusività è <b>bloccante</b>: se provi a duplicare un artista, non salva.
            </div>
          </div>

          <div class="card">
            <div class="title">
              <div class="ibox">💾</div>
              <div>
                <div class="t1">Dati salvati</div>
                <div class="t2">Nel browser (locale). Export consigliato.</div>
              </div>
            </div>

            <div class="mutebox">
              Se cambi telefono o browser, fai <b>Export</b> prima, poi <b>Import</b> sul nuovo dispositivo.
            </div>
          </div>
        </div>
      `;
    }

    // ==========
    // Escaping helpers (prevent HTML break)
    // ==========
    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function escapeAttr(str){
      // safe for attributes
      return escapeHtml(str).replaceAll("\n"," ");
    }

    // ==========
    // Boot
    // ==========
    try{
      // Enforce exclusivity at boot (just in case imported data has dups)
      const dups = findRosterDuplicates(state.teams);
      if(Object.keys(dups).length){
        dupError = formatDupError(dups);
      }

      renderApp();
      toast("Online ✨");
    }catch(e){
      document.getElementById("app").innerHTML = `
        <div class="wrap">
          <div class="card">
            <div class="title">
              <div class="ibox">😵</div>
              <div>
                <div class="t1">Errore di caricamento</div>
                <div class="t2">C’è un errore JS. Fai refresh con <span class="mono">?v=3</span>.</div>
              </div>
            </div>
            <pre class="mutebox" style="white-space:pre-wrap">${escapeHtml(String(e))}</pre>
          </div>
        </div>
      `;
      console.error(e);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SVT Official FantaSanremo</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-100 min-h-screen p-6">

<div class="max-w-4xl mx-auto">

<h1 class="text-3xl font-extrabold mb-6">
🏆 SVT Official FantaSanremo
</h1>

<div class="bg-white p-6 rounded-2xl shadow space-y-6">

<h2 class="text-xl font-bold">Squadre</h2>
<div id="teams"></div>

<button onclick="addTeam()" class="bg-black text-white px-4 py-2 rounded-xl">
+ Aggiungi Squadra
</button>

<hr>

<h2 class="text-xl font-bold">Inserisci Punti Serata</h2>

<textarea id="bulkInput" rows="5" class="w-full border rounded-xl p-3"
placeholder="Formato:
Annalisa = 14
Ghali = 7"></textarea>

<button onclick="applyPoints()" class="bg-black text-white px-4 py-2 rounded-xl mt-2">
Calcola
</button>

<hr>

<h2 class="text-xl font-bold">Classifica</h2>
<div id="standings"></div>

</div>
</div>

<script>
let teams = [
  { name: "Geberit", roster: [], captain: "", total: 0 },
  { name: "Ghigliottina", roster: [], captain: "", total: 0 },
  { name: "Mud Max", roster: [], captain: "", total: 0 },
  { name: "Sunday Bini", roster: [], captain: "", total: 0 },
  { name: "OpenAI Collective", roster: [], captain: "", total: 0 },
  { name: "Bradbury", roster: [], captain: "", total: 0 },
  { name: "Branca Menta", roster: [], captain: "", total: 0 },
  { name: "Eclissi", roster: [], captain: "", total: 0 },
  { name: "I gasati", roster: [], captain: "", total: 0 },
  { name: "Tempo Libero: Rolex", roster: [], captain: "", total: 0 }
];

function render() {
  const container = document.getElementById("teams");
  container.innerHTML = "";

  teams.forEach((team, i) => {
    container.innerHTML += `
      <div class="border rounded-xl p-4 mb-3 bg-zinc-50">
        <div class="font-bold">${team.name}</div>
        <input class="w-full border rounded p-2 mt-2"
          placeholder="Roster (uno per riga)"
          onchange="updateRoster(${i}, this.value)"
          value="${team.roster.join("\n")}">
        <input class="w-full border rounded p-2 mt-2"
          placeholder="Capitano"
          onchange="updateCaptain(${i}, this.value)"
          value="${team.captain}">
      </div>
    `;
  });
}

function updateRoster(i, value) {
  let list = value.split("\n").map(x => x.trim()).filter(x => x);
  if (hasDuplicates(i, list)) {
    alert("❌ Artista già presente in un'altra squadra!");
    return;
  }
  teams[i].roster = list;
}

function updateCaptain(i, value) {
  teams[i].captain = value.trim();
}

function hasDuplicates(currentIndex, newRoster) {
  for (let j = 0; j < teams.length; j++) {
    if (j === currentIndex) continue;
    for (let artist of newRoster) {
      if (teams[j].roster.includes(artist)) {
        return true;
      }
    }
  }
  return false;
}

function applyPoints() {
  let text = document.getElementById("bulkInput").value;
  let lines = text.split("\n");
  let points = {};

  lines.forEach(line => {
    let match = line.match(/^(.*?)[=:]\s*(-?\d+)/);
    if (match) {
      points[match[1].trim()] = parseInt(match[2]);
    }
  });

  teams.forEach(team => {
    let sum = 0;
    team.roster.forEach(artist => {
      let val = points[artist] || 0;
      sum += val;
      if (artist === team.captain) sum += val; // Capitano x2
    });
    team.total = sum;
  });

  renderStandings();
}

function renderStandings() {
  let sorted = [...teams].sort((a,b)=>b.total-a.total);
  const container = document.getElementById("standings");
  container.innerHTML = "";

  sorted.forEach((team, i) => {
    container.innerHTML += `
      <div class="flex justify-between border rounded-xl p-3 bg-white mb-2">
        <div>#${i+1} ${team.name}</div>
        <div class="font-bold">${team.total}</div>
      </div>
    `;
  });
}

function addTeam() {
  let name = prompt("Nome squadra?");
  if (!name) return;
  teams.push({ name, roster: [], captain: "", total: 0 });
  render();
}

render();
</script>

</body>
</html>
